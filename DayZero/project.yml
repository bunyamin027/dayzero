name: DayZero
options:
  bundleIdPrefix: com.dayzero
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: 5
targets:
  DayZero:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      base:
        DEVELOPMENT_TEAM: ZS89AATCJ2
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 5
    entitlements:
      path: DayZero.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.dayzero.shared
    scheme:
      testTargets: []
    sources:
      - path: .
        excludes:
          - project.yml
          - DayZeroWidget
          - build
          - .DS_Store
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSSupportsLiveActivities: true
        NSCalendarsUsageDescription: "DayZero needs access to your calendar to import your events automatically."
        NSCalendarsFullAccessUsageDescription: "DayZero needs full access to your calendar to read your upcoming events and import them."
        NSPhotoLibraryUsageDescription: "DayZero needs access to your photos to attach memories to your events."
        CFBundleDisplayName: DayZero
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        "UISupportedInterfaceOrientations~ipad": [UIInterfaceOrientationPortrait, UIInterfaceOrientationPortraitUpsideDown, UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight]
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: "DayZero needs access to your camera to capture memories for your events."
    dependencies:
      - target: DayZeroWidget

  DayZeroWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      base:
        DEVELOPMENT_TEAM: ZS89AATCJ2
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.dayzero.DayZero.DayZeroWidget
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 5
    entitlements:
      path: DayZeroWidget/DayZeroWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.dayzero.shared
    info:
      path: DayZeroWidget/Info.plist
      properties:
        CFBundleDisplayName: DayZero Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    sources:
      - path: DayZeroWidget
      - path: Models
